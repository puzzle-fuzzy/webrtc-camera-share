name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:
    inputs:
      turn_e2e_base_url:
        description: "HTTPS base URL of an environment with real TURN configured"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Canonical verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - run: cargo xtask verify

  audit:
    name: Dependency audits
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - run: bun install --frozen-lockfile
      - run: bun audit --registry=https://registry.npmjs.org --audit-level=low
      - run: cargo install cargo-audit --locked
      - run: cargo audit --deny warnings

  e2e:
    name: Chromium WebRTC acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: cargo xtask e2e

  turn-relay:
    name: Opt-in TURN relay acceptance
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run --cwd apps/web test:e2e -- turn-relay.spec.ts
        env:
          TURN_E2E: "1"
          E2E_BASE_URL: ${{ inputs.turn_e2e_base_url }}

  release-smoke:
    name: Release smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: target/release/webrtc-camera-share-server
          - os: windows-latest
            binary: target/release/webrtc-camera-share-server.exe
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - run: bun install --frozen-lockfile
      - run: cargo xtask release
      - run: cargo xtask smoke -- ${{ matrix.binary }}

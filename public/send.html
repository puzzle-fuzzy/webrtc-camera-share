<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>发送端</title>
  <style>
    * {
      margin: 0;
      box-sizing: border-box
    }

    body {
      background: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
      min-height: 100dvh;
      padding: 16px;
      display: grid;
      place-items: center
    }

    main {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px
    }

    h1 {
      font-size: 20px;
      font-weight: 650;
      line-height: 1.25
    }

    .role-label {
      color: #a7f3d0;
      font-size: 13px
    }

    .session {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: end
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
      color: #d4d4d4;
      font-size: 13px
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid #525252;
      border-radius: 8px;
      background: #1c1c1c;
      color: #fff;
      padding: 10px 12px;
      font: inherit
    }

    input::placeholder {
      color: #a3a3a3
    }

    input:disabled {
      cursor: not-allowed;
      opacity: .65
    }

    .session-actions {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .secondary,
    .receiver-link {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 13px
    }

    .secondary {
      padding: 8px 14px;
      background: #2b2b2b;
      color: #fff
    }

    .receiver-link {
      color: #d4d4d4;
      text-underline-offset: 3px
    }

    video {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      background: #000;
      object-fit: cover
    }

    p {
      min-height: 20px;
      font-size: 13px;
      color: #a3a3a3;
      text-align: center
    }

    .btns {
      display: flex;
      justify-content: center;
      gap: 12px
    }

    button {
      min-height: 44px;
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer
    }

    button:focus-visible,
    input:focus-visible,
    a:focus-visible {
      outline: 3px solid #4ade80;
      outline-offset: 2px
    }

    .start {
      background: #07C160;
      color: #fff
    }

    .stop {
      background: #FF3B30;
      color: #fff
    }

    @media (max-width: 640px) {
      body {
        padding: env(safe-area-inset-top, 12px) 12px env(safe-area-inset-bottom, 12px)
      }

      h1 {
        font-size: 18px
      }

      video {
        max-width: 100%;
        border-radius: 6px
      }

      button {
        padding: 14px 40px;
        font-size: 16px
      }
    }

    @media (max-width: 440px) {
      .session {
        grid-template-columns: 1fr
      }

      .session-actions {
        align-items: stretch;
        flex-direction: column
      }

      .secondary,
      .receiver-link {
        width: 100%
      }
    }
  </style>
</head>

<body>
  <main>
    <header class="page-header">
      <h1>发送端</h1>
      <span class="role-label" id="viewerCount">0 个接收端</span>
    </header>

    <section class="session" aria-label="会话设置">
      <label class="field">
        房间 ID
        <input id="roomInput" type="text" autocomplete="off" maxlength="32" spellcheck="false">
      </label>
      <label class="field">
        访问码
        <input id="accessCodeInput" type="password" autocomplete="off" minlength="6" maxlength="32">
      </label>
      <div class="session-actions">
        <button class="secondary" id="copyLinkBtn" type="button">复制接收链接</button>
        <a class="receiver-link" id="receiverLink" target="_blank" rel="noopener">打开接收端</a>
      </div>
    </section>

    <video id="preview" autoplay playsinline muted aria-label="本地摄像头预览"></video>
    <p id="status" role="status" aria-live="polite">配置房间后开始发送</p>
    <div class="btns">
      <button class="start" id="startBtn" type="button">开始发送</button>
      <button class="stop" id="stopBtn" type="button" style="display:none">停止发送</button>
    </div>
  </main>

  <script>
    const preview = document.getElementById("preview");
    const status = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const roomInput = document.getElementById("roomInput");
    const accessCodeInput = document.getElementById("accessCodeInput");
    const copyLinkBtn = document.getElementById("copyLinkBtn");
    const receiverLink = document.getElementById("receiverLink");
    const viewerCount = document.getElementById("viewerCount");

    let ws = null, localStream = null;
    const peers = new Map();

    const roomPattern = /^[a-z0-9][a-z0-9-]{1,30}[a-z0-9]$/;
    const accessCodePattern = /^[A-Za-z0-9]{6,32}$/;

    function randomHex(byteLength) {
      const bytes = new Uint8Array(byteLength);
      crypto.getRandomValues(bytes);
      return [...bytes].map(value => value.toString(16).padStart(2, "0")).join("");
    }

    function randomAccessCode() {
      const value = new Uint32Array(1);
      crypto.getRandomValues(value);
      return String(100000 + value[0] % 900000);
    }

    function readSession(showError = true) {
      const room = roomInput.value.trim().toLowerCase();
      const key = accessCodeInput.value.trim();

      if (!roomPattern.test(room)) {
        if (showError) status.textContent = "房间 ID 需为 3 到 32 位小写字母、数字或连字符";
        return null;
      }
      if (!accessCodePattern.test(key)) {
        if (showError) status.textContent = "访问码需为 6 到 32 位字母或数字";
        return null;
      }

      roomInput.value = room;
      return { room, key };
    }

    function saveSessionHash(session) {
      const hash = new URLSearchParams(session).toString();
      history.replaceState(null, "", location.pathname + location.search + "#" + hash);
    }

    function buildReceiverUrl(session) {
      const url = new URL("recv.html", location.href);
      url.hash = new URLSearchParams(session).toString();
      return url;
    }

    function updateReceiverLink() {
      const session = readSession(false);
      if (!session) {
        receiverLink.removeAttribute("href");
        receiverLink.setAttribute("aria-disabled", "true");
        return;
      }

      receiverLink.href = buildReceiverUrl(session);
      receiverLink.removeAttribute("aria-disabled");
    }

    function setSessionDisabled(disabled) {
      roomInput.disabled = disabled;
      accessCodeInput.disabled = disabled;
    }

    function sendSignal(signal) {
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(signal));
      }
    }

    function updateViewerCount() {
      const connected = [...peers.values()].filter(
        state => state.connection.connectionState === "connected"
      ).length;
      viewerCount.textContent = peers.size === 0
        ? "0 个接收端"
        : `${connected}/${peers.size} 个已连接`;
    }

    function closePeerConnection(peerId) {
      const state = peers.get(peerId);
      if (!state) return;

      peers.delete(peerId);
      state.connection.onicecandidate = null;
      state.connection.onconnectionstatechange = null;
      state.connection.oniceconnectionstatechange = null;
      state.connection.close();
      updateViewerCount();
    }

    function closeAllPeerConnections() {
      for (const peerId of [...peers.keys()]) closePeerConnection(peerId);
    }

    function createPeerConnection(peerId) {
      const connection = new RTCPeerConnection({
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:stun.services.mozilla.com" }
        ]
      });
      const state = {
        connection,
        iceCandidatesQueue: []
      };
      peers.set(peerId, state);
      localStream.getTracks().forEach(track => connection.addTrack(track, localStream));

      connection.onicecandidate = (event) => {
        if (peers.get(peerId) === state && event.candidate) {
          sendSignal({ peerId, ice: event.candidate });
        }
      };
      connection.onconnectionstatechange = () => {
        if (peers.get(peerId) !== state) return;
        updateViewerCount();

        if (connection.connectionState === "connected") {
          const connected = [...peers.values()].filter(
            peer => peer.connection.connectionState === "connected"
          ).length;
          status.textContent = `${connected} 个接收端已连接`;
        } else if (connection.connectionState === "failed") {
          closePeerConnection(peerId);
          status.textContent = "一个接收端连接失败，继续等待...";
        }
      };
      connection.oniceconnectionstatechange = () => {
        if (peers.get(peerId) !== state) return;
        if (connection.iceConnectionState === "disconnected") {
          status.textContent = "一个接收端暂时断开，正在恢复...";
        }
      };

      updateViewerCount();
      return state;
    }

    async function processIceCandidates(peerId, state) {
      if (peers.get(peerId) !== state || !state.connection.remoteDescription) return;
      while (state.iceCandidatesQueue.length > 0) {
        const candidate = state.iceCandidatesQueue.shift();
        try {
          await state.connection.addIceCandidate(new RTCIceCandidate(candidate));
        } catch (err) {
          console.warn("Failed to add ICE candidate:", err);
        }
      }
    }

    async function createAndSendOffer(peerId) {
      if (!peerId || !localStream || ws?.readyState !== WebSocket.OPEN) return;

      closePeerConnection(peerId);
      const state = createPeerConnection(peerId);
      status.textContent = `${peers.size} 个接收端已加入，正在协商...`;

      try {
        const offer = await state.connection.createOffer();
        await state.connection.setLocalDescription(offer);
        if (peers.get(peerId) === state) sendSignal({ peerId, sdp: offer });
      } catch (err) {
        console.error("Failed to create offer:", err);
        if (peers.get(peerId) === state) {
          closePeerConnection(peerId);
          status.textContent = "为一个接收端创建连接失败";
        }
      }
    }

    function cleanup(message = "已停止") {
      const socket = ws;
      ws = null;
      if (socket && socket.readyState < WebSocket.CLOSING) socket.close(1000);

      localStream?.getTracks().forEach(t => t.stop());
      localStream = null;
      closeAllPeerConnections();
      preview.srcObject = null;
      setSessionDisabled(false);
      startBtn.style.display = "";
      stopBtn.style.display = "none";
      status.textContent = message;
    }

    startBtn.onclick = async () => {
      const session = readSession();
      if (!session) return;

      saveSessionHash(session);
      updateReceiverLink();
      setSessionDisabled(true);
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
        });
        preview.srcObject = localStream;
        await preview.play();

        const socketUrl = new URL("/ws", location.href);
        socketUrl.protocol = location.protocol === "https:" ? "wss:" : "ws:";
        socketUrl.searchParams.set("role", "send");
        socketUrl.searchParams.set("room", session.room);
        socketUrl.searchParams.set("key", session.key);
        const socket = new WebSocket(socketUrl);
        ws = socket;

        socket.onopen = () => {
          status.textContent = `已加入 ${session.room}，等待接收端...`;
        };

        socket.onmessage = async (event) => {
          let data;
          try { data = JSON.parse(event.data); } catch { return; }

          if (data.type === "receiver-ready" && data.peerId) {
            await createAndSendOffer(data.peerId);
            return;
          }
          if (data.type === "peer-left" && data.role === "recv" && data.peerId) {
            closePeerConnection(data.peerId);
            status.textContent = peers.size === 0
              ? "接收端已全部离线，继续等待..."
              : `${peers.size} 个接收端仍在线`;
            return;
          }
          if (data.type === "error") {
            if (data.code === "PEER_NOT_FOUND" && data.peerId) {
              closePeerConnection(data.peerId);
            }
            status.textContent = "信令错误：" + data.message;
            return;
          }

          if (data.sdp?.type === "answer" && data.peerId) {
            const state = peers.get(data.peerId);
            if (!state || state.connection.signalingState !== "have-local-offer") return;
            await state.connection.setRemoteDescription(new RTCSessionDescription(data.sdp));
            await processIceCandidates(data.peerId, state);
            status.textContent = "已收到接收端应答，正在建立连接...";
          } else if (data.ice && data.peerId) {
            const state = peers.get(data.peerId);
            if (!state) return;
            state.iceCandidatesQueue.push(data.ice);
            await processIceCandidates(data.peerId, state);
          }
        };

        socket.onerror = () => { status.textContent = "WebSocket 连接错误"; };
        socket.onclose = (event) => {
          if (ws !== socket) return;
          if (event.code === 4003) {
            cleanup("访问码不正确，房间已由其他访问码创建");
          } else if (event.code === 4009) {
            cleanup("该房间已有发送端在线");
          } else {
            cleanup("信令连接已关闭");
          }
        };
        startBtn.style.display = "none";
        stopBtn.style.display = "";
        status.textContent = "正在连接...";
      } catch (err) {
        console.error("Error:", err);
        const name = err instanceof DOMException ? err.name : "";
        const message = err instanceof Error ? err.message : String(err);
        if (name === "NotAllowedError") cleanup("摄像头权限被拒绝");
        else if (name === "NotFoundError") cleanup("未找到摄像头设备");
        else cleanup("错误：" + message);
      }
    };

    stopBtn.onclick = () => cleanup();

    copyLinkBtn.onclick = async () => {
      const session = readSession();
      if (!session) return;

      saveSessionHash(session);
      updateReceiverLink();
      status.textContent = "正在复制接收链接...";
      try {
        const copy = navigator.clipboard?.writeText(buildReceiverUrl(session).href);
        if (!copy) throw new Error("Clipboard API unavailable");
        await Promise.race([
          copy,
          new Promise((_, reject) => setTimeout(() => reject(new Error("Clipboard timeout")), 1000))
        ]);
        status.textContent = "接收链接已复制";
      } catch {
        status.textContent = "无法自动复制，请点击“打开接收端”后复制地址";
        receiverLink.focus();
      }
    };

    roomInput.addEventListener("input", updateReceiverLink);
    accessCodeInput.addEventListener("input", updateReceiverLink);

    const initialParams = new URLSearchParams(location.hash.slice(1));
    roomInput.value = initialParams.get("room") || `demo-${randomHex(3)}`;
    accessCodeInput.value = initialParams.get("key") || randomAccessCode();
    const initialSession = readSession(false);
    if (initialSession) saveSessionHash(initialSession);
    updateReceiverLink();
  </script>
</body>

</html>
